<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CA Pharmacy | Prescriptions</title>
  <meta name="description" content="Prescription workflow frontend for CA Pharmacy.">
  <link rel="icon" href="../assets/images/logo-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/app.css">
  <script src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.min.js" defer></script>
</head>
<body data-page="prescriptions">
  <div class="app-scrim d-lg-none" id="appScrim"></div>
  <div class="app-shell">
    <aside class="app-sidebar" id="appSidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar"></header>
      <main class="app-content container-fluid py-4 px-3 px-xl-4">
        <section class="d-flex flex-column flex-xl-row align-items-xl-end justify-content-between gap-3 mb-4">
          <div>
            <span class="page-kicker">Workflow board</span>
            <h1 class="page-title mb-1">Prescriptions</h1>
            <p class="page-subtitle mb-0">Monitor intake, verification, pickup, and dispensing from one board.</p>
          </div>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-outline-secondary btn-sm px-3" type="button">Scan script</button>
            <button class="btn btn-success btn-sm px-3" type="button" data-add-rx>New prescription</button>
          </div>
        </section>

        <section class="row g-4" data-rx-board></section>
      </main>
    </div>
  </div>
  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
