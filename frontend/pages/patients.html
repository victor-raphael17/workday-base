<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CA Pharmacy | Patients</title>
  <meta name="description" content="Patient management frontend for CA Pharmacy.">
  <link rel="icon" href="../assets/images/logo-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/app.css">
  <script src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.min.js" defer></script>
</head>
<body data-page="patients">
  <div class="app-scrim d-lg-none" id="appScrim"></div>
  <div class="app-shell">
    <aside class="app-sidebar" id="appSidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar"></header>
      <main class="app-content container-fluid py-4 px-3 px-xl-4">
        <section class="d-flex flex-column flex-xl-row align-items-xl-end justify-content-between gap-3 mb-4">
          <div>
            <span class="page-kicker">Patient records</span>
            <h1 class="page-title mb-1">Patients</h1>
            <p class="page-subtitle mb-0">Search profiles, insurance plans, allergies, and active medications.</p>
          </div>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-outline-secondary btn-sm px-3" type="button">Export</button>
            <button class="btn btn-success btn-sm px-3" type="button" data-add-patient>Add patient</button>
          </div>
        </section>

        <section class="row g-4">
          <div class="col-12 col-xl-8">
            <div class="d-flex justify-content-end mb-3">
              <label class="page-search mb-0">
                <i data-lucide="search"></i>
                <input type="search" placeholder="Search name, ID or plan..." data-patient-search>
              </label>
            </div>
            <article class="card border-0 shadow-sm list-card">
              <div class="table-responsive px-4 py-2">
                <table class="table align-middle data-table mb-0">
                  <thead>
                    <tr>
                      <th scope="col">Patient</th>
                      <th scope="col">ID</th>
                      <th scope="col">Date of birth</th>
                      <th scope="col">Plan</th>
                      <th scope="col" class="text-end">Active rx</th>
                      <th scope="col">Last visit</th>
                    </tr>
                  </thead>
                  <tbody data-patient-body></tbody>
                </table>
              </div>
            </article>
          </div>

          <div class="col-12 col-xl-4">
            <article class="card border-0 shadow-sm detail-card selected-panel">
              <div class="card-body p-4 d-flex flex-column gap-4">
                <div class="d-flex align-items-start justify-content-between gap-3">
                  <div>
                    <div class="detail-title" data-patient="name">Amara Okafor</div>
                    <div class="detail-subtitle mono" data-patient="summary">PT-4821 · DOB 14 Mar 1989</div>
                  </div>
                  <button class="btn btn-success btn-sm px-3" type="button">New prescription</button>
                </div>
                <div class="detail-list">
                  <div class="detail-row"><span class="detail-row-label">Phone</span><span class="detail-row-value mono" data-patient="phone">(555) 0142</span></div>
                  <div class="detail-row"><span class="detail-row-label">Plan</span><span class="detail-row-value" data-patient="plan">MedAid Plus</span></div>
                  <div class="detail-row"><span class="detail-row-label">Active prescriptions</span><span class="detail-row-value mono" data-patient="active">2</span></div>
                </div>
                <div>
                  <div class="page-kicker mb-2">Allergies</div>
                  <div class="chip-row" data-patient="allergies"></div>
                </div>
                <div>
                  <div class="page-kicker mb-2">Current medications</div>
                  <div class="chip-row" data-patient="medications"></div>
                </div>
              </div>
            </article>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
