<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface);font-family:var(--font-sans);padding:20px 24px;color:var(--fg)}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:16px 10px}
  .ic{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--slate-600)}
  .ic svg{width:22px;height:22px}
  .nm{font-family:var(--font-mono);font-size:9px;color:var(--fg-subtle);text-align:center}
  .note{margin-top:16px;font-size:12px;color:var(--fg-subtle)}
</style></head>
<body>
  <div class="grid">
    <div class="ic"><i data-lucide="pill"></i><span class="nm">pill</span></div>
    <div class="ic"><i data-lucide="package"></i><span class="nm">package</span></div>
    <div class="ic"><i data-lucide="package-search"></i><span class="nm">pkg-search</span></div>
    <div class="ic"><i data-lucide="scan-line"></i><span class="nm">scan-line</span></div>
    <div class="ic"><i data-lucide="shopping-cart"></i><span class="nm">cart</span></div>
    <div class="ic"><i data-lucide="receipt"></i><span class="nm">receipt</span></div>
    <div class="ic"><i data-lucide="clipboard-list"></i><span class="nm">clipboard</span></div>
    <div class="ic"><i data-lucide="alert-triangle"></i><span class="nm">alert</span></div>
    <div class="ic"><i data-lucide="calendar-clock"></i><span class="nm">expiry</span></div>
    <div class="ic"><i data-lucide="shield-alert"></i><span class="nm">controlled</span></div>
    <div class="ic"><i data-lucide="truck"></i><span class="nm">orders</span></div>
    <div class="ic"><i data-lucide="users"></i><span class="nm">patients</span></div>
    <div class="ic"><i data-lucide="bar-chart-3"></i><span class="nm">reports</span></div>
    <div class="ic"><i data-lucide="search"></i><span class="nm">search</span></div>
    <div class="ic"><i data-lucide="check"></i><span class="nm">check</span></div>
    <div class="ic"><i data-lucide="x"></i><span class="nm">x</span></div>
  </div>
  <div class="note">Lucide · 1.75px stroke · inherits currentColor. <em>Substituted set — flag for review.</em></div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body></html>
