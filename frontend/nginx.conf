server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted build assets.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve pages; fall back to the dashboard for unknown paths.
    location / {
        try_files $uri $uri/ /pages/dashboard.html;
    }
}
