<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CA Pharmacy | Orders</title>
  <meta name="description" content="Supplier orders frontend for CA Pharmacy.">
  <link rel="icon" href="../assets/images/logo-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/app.css">
  <script src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.min.js" defer></script>
</head>
<body data-page="orders">
  <div class="app-scrim d-lg-none" id="appScrim"></div>
  <div class="app-shell">
    <aside class="app-sidebar" id="appSidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar"></header>
      <main class="app-content container-fluid py-4 px-3 px-xl-4">
        <section class="d-flex flex-column flex-xl-row align-items-xl-end justify-content-between gap-3 mb-4">
          <div>
            <span class="page-kicker">Procurement</span>
            <h1 class="page-title mb-1">Orders</h1>
            <p class="page-subtitle mb-0">Track supplier purchase orders and incoming stock commitments.</p>
          </div>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-outline-secondary btn-sm px-3" type="button">Receive stock</button>
            <button class="btn btn-success btn-sm px-3" type="button" data-add-order>Create order</button>
          </div>
        </section>

        <section class="banner-alert mb-4">
          <i data-lucide="alert-triangle"></i>
          <div class="flex-grow-1" data-reorder-banner>
            <strong>Checking stock levels…</strong>
          </div>
          <button class="btn btn-success btn-sm px-3" type="button" data-add-order>Create reorder</button>
        </section>

        <section class="row g-4">
          <div class="col-12 col-xl-8">
            <article class="card border-0 shadow-sm list-card">
              <div class="table-responsive px-4 py-2">
                <table class="table align-middle data-table mb-0">
                  <thead>
                    <tr>
                      <th scope="col">Order</th>
                      <th scope="col">Supplier</th>
                      <th scope="col" class="text-end">Items</th>
                      <th scope="col" class="text-end">Units</th>
                      <th scope="col">Expected</th>
                      <th scope="col">Status</th>
                      <th scope="col" class="text-end">Total</th>
                    </tr>
                  </thead>
                  <tbody data-order-body></tbody>
                </table>
              </div>
            </article>
          </div>

          <div class="col-12 col-xl-4">
            <article class="card border-0 shadow-sm detail-card selected-panel">
              <div class="card-body p-4 d-flex flex-column gap-4">
                <div class="d-flex align-items-start justify-content-between gap-3">
                  <div>
                    <div class="page-kicker mb-2">Selected order</div>
                    <div class="detail-title mono" data-order="id">PO-2061</div>
                    <div class="detail-subtitle" data-order="supplier">MedSource Distribution</div>
                  </div>
                  <span class="status-badge status-warning" data-order="badge">In transit</span>
                </div>
                <div class="detail-list">
                  <div class="detail-row"><span class="detail-row-label">Expected</span><span class="detail-row-value mono" data-order="expected">07 Jun 2026</span></div>
                  <div class="detail-row"><span class="detail-row-label">Units</span><span class="detail-row-value mono" data-order="units">320</span></div>
                  <div class="detail-row"><span class="detail-row-label">Total</span><span class="detail-row-value mono" data-order="total">$4,180.50</span></div>
                </div>
                <div>
                  <div class="page-kicker mb-2">Line items preview</div>
                  <div class="detail-list" data-order="lines"></div>
                </div>
                <div class="d-flex flex-wrap gap-2" data-order="actions"></div>
              </div>
            </article>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
