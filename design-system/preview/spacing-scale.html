<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface);font-family:var(--font-sans);padding:20px 24px;color:var(--fg)}
  .row{display:flex;align-items:center;gap:12px;padding:4px 0}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);width:74px;flex:none}
  .bar{height:14px;background:var(--green-300);border-radius:3px}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--fg-disabled)}
</style></head>
<body>
  <div class="row"><span class="tag">space-2</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="row"><span class="tag">space-3</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="row"><span class="tag">space-4</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="row"><span class="tag">space-5</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="row"><span class="tag">space-7</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="row"><span class="tag">space-8</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="row"><span class="tag">space-10</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
  <div class="row"><span class="tag">space-12</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
</body></html>
