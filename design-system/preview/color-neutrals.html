<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface);font-family:var(--font-sans);padding:20px 24px;color:var(--fg)}
  .scale{display:flex;gap:6px}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px}
  .chip{height:54px;border-radius:8px;border:1px solid var(--border)}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);text-align:center}
  .lead{margin-bottom:14px}
</style></head>
<body>
  <div class="lead t-label">Cool Slate — neutrals (surfaces · borders · ink)</div>
  <div class="scale">
    <div class="sw"><div class="chip" style="background:var(--slate-0)"></div><div class="n">0</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-50)"></div><div class="n">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-100)"></div><div class="n">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-200)"></div><div class="n">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-300)"></div><div class="n">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-400)"></div><div class="n">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-500)"></div><div class="n">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-600)"></div><div class="n">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-700)"></div><div class="n">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-800)"></div><div class="n">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-900)"></div><div class="n">900</div></div>
  </div>
</body></html>
