<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface);font-family:var(--font-sans);padding:22px 24px;color:var(--fg);display:flex;gap:18px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:74px;height:54px;background:var(--green-50);border:1.5px solid var(--green-400)}
  .k{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle)}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--fg-disabled)}
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="k">xs</div><div class="v">4</div></div>
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="k">sm</div><div class="v">6</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="k">md · inputs</div><div class="v">8</div></div>
  <div class="item"><div class="box" style="border-radius:10px"></div><div class="k">lg · cards</div><div class="v">10</div></div>
  <div class="item"><div class="box" style="border-radius:14px"></div><div class="k">xl · panels</div><div class="v">14</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="k">pill</div><div class="v">999</div></div>
</body></html>
