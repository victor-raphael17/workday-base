<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CA Pharmacy | Point of sale</title>
  <meta name="description" content="Point of sale frontend for CA Pharmacy.">
  <link rel="icon" href="../assets/images/logo-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/app.css">
  <script src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.min.js" defer></script>
</head>
<body data-page="pos">
  <div class="app-scrim d-lg-none" id="appScrim"></div>
  <div class="app-shell">
    <aside class="app-sidebar" id="appSidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar"></header>
      <main class="app-content container-fluid py-4 px-3 px-xl-4">
        <section class="d-flex flex-column flex-xl-row align-items-xl-end justify-content-between gap-3 mb-4">
          <div>
            <span class="page-kicker">Cash register</span>
            <h1 class="page-title mb-1">Point of sale</h1>
            <p class="page-subtitle mb-0">Register 1. Cashier: Jade Okafor.</p>
          </div>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-success btn-sm px-3" type="button" data-take-payment disabled>Take payment</button>
          </div>
        </section>

        <section class="row g-4">
          <div class="col-12 col-xl-7 d-flex flex-column gap-3">
            <label class="scan-card">
              <i data-lucide="scan-line"></i>
              <input type="search" placeholder="Search or scan to add..." data-scan-input aria-label="Search or scan to add">
              <kbd class="mono border rounded px-2 py-1 bg-body-tertiary">F2</kbd>
            </label>

            <div class="product-grid" data-product-grid></div>
          </div>

          <div class="col-12 col-xl-5">
            <article class="card border-0 shadow-sm detail-card">
              <div class="card-header bg-transparent border-0 d-flex align-items-center justify-content-between px-4 pt-4 pb-2">
                <div>
                  <h2 class="section-title mb-1">Current sale</h2>
                  <p class="section-subtitle mb-0">Adjust quantities before payment.</p>
                </div>
                <button class="btn btn-link btn-sm text-decoration-none px-0" type="button" data-cart-clear>Clear</button>
              </div>
              <div data-cart-list></div>
              <div class="card-body pt-0 px-4 pb-4">
                <div class="banner-alert mb-3" data-pos="controlled-warning">
                  <i data-lucide="shield-alert"></i>
                  <div>
                    <strong>Controlled item in cart</strong>
                    <p class="mono">Record this sale in the controlled substances register.</p>
                  </div>
                </div>
                <label class="modal-field mb-3">
                  <span>Payment method</span>
                  <select data-payment-method>
                    <option value="card">Card</option>
                    <option value="cash">Cash</option>
                    <option value="insurance">Insurance</option>
                  </select>
                </label>
                <div class="detail-list">
                  <div class="detail-row"><span class="detail-row-label">Subtotal</span><span class="detail-row-value mono" data-pos="subtotal">$0.00</span></div>
                  <div class="detail-row"><span class="detail-row-label">Tax (5%)</span><span class="detail-row-value mono" data-pos="tax">$0.00</span></div>
                  <div class="detail-row"><span class="detail-row-label fw-semibold text-dark">Total</span><span class="detail-row-value mono fw-bold" data-pos="total">$0.00</span></div>
                </div>
              </div>
            </article>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
