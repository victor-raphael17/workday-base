<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--canvas);font-family:var(--font-sans);padding:26px 24px;color:var(--fg);display:flex;gap:24px;align-items:center}
  .item{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:96px;height:56px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
  .k{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)}
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="k">xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="k">sm · cards</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="k">md · popover</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="k">lg · modal</div></div>
</body></html>
