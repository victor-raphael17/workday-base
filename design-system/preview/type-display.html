<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface);font-family:var(--font-sans);padding:22px 24px;color:var(--fg)}
  .row{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid var(--divider)}
  .row:last-child{border-bottom:none}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);width:62px;flex:none}
  .spec{color:var(--fg-subtle);font-family:var(--font-mono);font-size:11px;margin-left:auto}
</style></head>
<body>
  <div class="row"><span class="tag">display</span><span class="t-display" style="font-size:36px">Dispensary</span><span class="spec">800 · 44/1.15</span></div>
  <div class="row"><span class="tag">h1</span><span class="t-h1" style="font-size:30px">Stock control</span><span class="spec">700 · 34</span></div>
  <div class="row"><span class="tag">h2</span><span class="t-h2">Today's sales</span><span class="spec">700 · 28</span></div>
  <div class="row"><span class="tag">h3</span><span class="t-h3">Reorder list</span><span class="spec">600 · 23</span></div>
  <div class="row"><span class="tag">h4</span><span class="t-h4">Batch detail</span><span class="spec">600 · 19</span></div>
</body></html>
